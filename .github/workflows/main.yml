name: Gemini Bot Auto Refresh

on:
  schedule:
    - cron: '0 */5 * * *' # التشغيل تلقائياً كل 5 ساعات
  workflow_dispatch:      # للسماح لك بتشغيله يدوياً عند الحاجة

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pyTelegramBotAPI google-genai

      - name: Run Bot
        # وضعنا timeout لضمان توقف السكربت قبل الجولة القادمة
        run: timeout 295m python ge.py 
        
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
