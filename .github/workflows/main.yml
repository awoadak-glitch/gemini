name: Gemini Bot Auto Refresh

on:
  schedule:
    - cron: '0 */5 * * *' 
  workflow_dispatch:      

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # حدثنا النسخة لتجنب التحذيرات

      - name: Install Dependencies
        run: |
          pip install pyTelegramBotAPI google-genai

      - name: Run Bot
        env:
          # هنا الربط الضروري بين إعدادات GitHub والكود
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: timeout 295m python ge.py
